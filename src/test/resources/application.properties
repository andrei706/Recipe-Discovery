spring.application.name=Recipe-Discovery

spring.datasource.url=jdbc:h2:mem:recipe_discovery_testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=recipe-discovery-super-secret-key-change-this-in-production-2026
jwt.expiration-ms=3600000

ai.provider=mock
