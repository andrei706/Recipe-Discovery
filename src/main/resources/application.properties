spring.application.name=Recipe-Discovery

server.port=8081

spring.datasource.url=jdbc:mysql://localhost:3306/recipe_discovery_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

server.error.include-message=always
server.error.include-binding-errors=always

jwt.secret=recipe-discovery-super-secret-key-change-this-in-production-2026
jwt.expiration-ms=3600000

# AI Configuration (choices: ollama, gemini, mock)
ai.provider=gemini

# LangChain4j Gemini settings
langchain4j.gemini.api-key=n
langchain4j.gemini.model-name=gemini-2.5-flash

# LangChain4j Ollama settings
langchain4j.ollama.base-url=http://localhost:11434
langchain4j.ollama.model-name=llama3


